priority: high
acceptance_criteria: |
  - MCP tools can track spec changes via git diff
  - Issues are created/updated automatically on spec changes
  - PR descriptions include relevant spec state and changes
  - CI workflow runs on push to main and syncs changes
  - All tests pass with 90%+ coverage
  - Documentation includes setup and usage examples

