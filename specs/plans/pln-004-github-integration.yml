flows:
  - id: pln-004-github-integration/flow-001
    name: Issue Creation Flow
    type: system
    description: Create GitHub issue when new spec is added
    steps:
      - Change tracker detects new spec file in git diff
      - Parse spec YAML to extract metadata
      - Check if issue already exists for spec ID
      - Create GitHub issue with spec content
      - Apply labels based on spec type and status
      - Add spec ID to issue body for traceability
      - Update spec file with GitHub issue link
    actors:
      - CI Workflow
      - GitHub API
    success_criteria:
      - Issue created with correct metadata
      - Labels applied correctly
      - Bidirectional link established

  - id: pln-004-github-integration/flow-002
    name: Issue Update Flow
    type: system
    description: Update GitHub issue when spec is modified
    steps:
      - Change tracker detects modified spec file
      - Parse updated spec YAML
      - Find linked GitHub issue (from spec metadata or search)
      - Generate change summary (diff of key fields)
      - Update issue with change summary and timestamp
      - Update labels if spec status changed
      - Preserve existing issue comments and content
    actors:
      - CI Workflow
      - GitHub API
    success_criteria:
      - Issue updated with change summary
      - Existing content preserved
      - Labels reflect current status

  - id: pln-004-github-integration/flow-003
    name: PR Description Generation Flow
    type: user
    description: Generate PR description with spec context
    steps:
      - User invokes PR description tool (MCP or CLI)
      - Tool detects changed spec files in PR branch
      - Load affected specs from YAML files
      - Generate spec state snapshot (IDs, names, status)
      - Generate change summary for each spec
      - Format markdown with sections (specs, changes, links)
      - Return formatted PR description
    actors:
      - Developer
      - MCP Client
    success_criteria:
      - Description includes all changed specs
      - Links to related issues included
      - Markdown properly formatted

  - id: pln-004-github-integration/flow-004
    name: CI Automation Flow
    type: system
    description: Automated sync on push to main
    steps:
      - Push to main triggers GitHub Actions workflow
      - Checkout repository and install dependencies
      - Run change tracker against previous commit
      - For each added spec, create GitHub issue
      - For each modified spec, update GitHub issue
      - For each deleted spec, add comment to issue (close optionally)
      - Comment workflow summary on commit
    actors:
      - GitHub Actions
      - CI Workflow
    success_criteria:
      - All spec changes processed
      - Issues created/updated correctly
      - Workflow completes without errors

